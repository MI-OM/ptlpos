services:
  - type: web
    name: ptlpos-api
    env: node
    plan: free
    buildCommand: npm install && npm run prisma:generate && npx nest build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Note: Add DATABASE_URL, REDIS_URL, JWT_SECRET, etc. in Render dashboard


services:
  - type: web
    name: ptlpos-api
    env: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm run prisma:generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    # Add these in Render dashboard:
    # DATABASE_URL - PostgreSQL (external service)
    # REDIS_URL - Redis (external service, optional)
    # JWT_SECRET - generate with: openssl rand -hex 32
    # MAILGUN_DOMAIN, MAILGUN_API_KEY, MAILGUN_FROM_EMAIL


